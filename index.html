<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenHealth.ai - Medtrade 2026 Booth Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0b6dee;
            --primary-blue-dark: #0958c5;
            --primary-blue-light: rgba(11, 109, 238, 0.1);
            --text-primary: #212529;
            --text-secondary: #495057;
            --text-light: #868e96;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #e9ecef;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-teal: #14b8a6;
            --font-display: 'Lexend', sans-serif;
            --font-body: 'Titillium Web', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(165deg, var(--bg-secondary) 0%, var(--bg-primary) 50%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(11, 109, 238, 0.06) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Soft glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            pointer-events: none;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: var(--primary-blue);
            top: -80px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            background: var(--accent-teal);
            bottom: 80px;
            left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        .orb-3 {
            width: 220px;
            height: 220px;
            background: var(--accent-purple);
            bottom: -60px;
            right: -50px;
            animation: float3 7s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 40px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -30px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -40px); }
        }

        /* Landscape two-column layout */
        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Left side: main content */
        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 48px;
            gap: 16px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 52px;
            width: auto;
        }

        .event-badge {
            display: inline-block;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid var(--bg-tertiary);
            padding: 8px 20px;
            border-radius: 24px;
        }

        .money-icon {
            font-size: 80px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .main-headline {
            font-family: var(--font-display);
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            text-align: center;
            color: var(--text-primary);
        }

        .highlight {
            color: var(--primary-blue);
        }

        .sub-headline {
            font-family: var(--font-body);
            font-size: 24px;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.4;
            text-align: center;
            max-width: 500px;
        }

        /* Prize card */
        .prize-card {
            background: var(--bg-primary);
            border: 3px solid var(--bg-tertiary);
            border-radius: 24px;
            padding: 32px 64px;
            text-align: center;
            box-shadow: 0 12px 48px rgba(11, 109, 238, 0.1);
        }

        .prize-label {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .prize-amount {
            font-family: var(--font-display);
            font-size: 96px;
            font-weight: 900;
            letter-spacing: -3px;
            color: var(--primary-blue);
            line-height: 1;
        }

        .prize-detail {
            font-family: var(--font-body);
            font-size: 26px;
            font-weight: 600;
            color: var(--text-light);
            margin-top: 6px;
        }

        /* Right side: QR code */
        .right-side {
            width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 48px;
            gap: 28px;
            background: linear-gradient(180deg, rgba(11, 109, 238, 0.03) 0%, rgba(139, 92, 246, 0.04) 100%);
            border-left: 1px solid var(--bg-tertiary);
        }

        .scan-label {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
        }

        .qr-wrapper {
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(11, 109, 238, 0.12);
        }

        .qr-wrapper img {
            width: 260px;
            height: 260px;
            display: block;
            border-radius: 10px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: var(--primary-blue);
            color: #ffffff;
            border-radius: 50%;
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-text {
            font-family: var(--font-body);
            font-size: 20px;
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>
